name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  action-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build a comment.created fixture without the trigger phrase
        run: |
          cat > /tmp/fixture-event.json <<'EOF'
          {
            "event": "comment.created",
            "workspace": { "id": "ws_1", "name": "CI Workspace" },
            "comment": {
              "id": "c_1", "workspace_id": "ws_1", "note_id": "note_1", "thread_id": "c_1",
              "quoted_text": "", "body": "just a regular comment, no mention",
              "edited": false, "created_at": "2026-01-01T00:00:00Z", "created_by": "u_1",
              "updated_at": "2026-01-01T00:00:00Z", "updated_by": "u_1"
            }
          }
          EOF
      - name: Run this action end-to-end via its own composite steps
        uses: ./
        with:
          anthropic-api-key: "sk-ant-ci-smoke-test"
          notomate-base-url: "http://localhost:8080"
          notomate-api-key: "ci-smoke-test"
        env:
          GITHUB_EVENT_PATH: /tmp/fixture-event.json
