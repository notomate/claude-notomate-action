name: "Claude Notomate Action"
description: "Runs the Claude Agent SDK against a notomate @claude comment mention and replies in the same thread."
author: "claude-notomate-action"

inputs:
  anthropic-api-key:
    description: "Anthropic API key used to run the Claude Agent SDK. Provide this or claude-code-oauth-token."
    required: false
    default: ""
  claude-code-oauth-token:
    description: "Claude Code OAuth token (from `claude setup-token`), used instead of a metered API key when running under a Claude subscription. Provide this or anthropic-api-key."
    required: false
    default: ""
  notomate-base-url:
    description: "Base URL notomate is reachable at, e.g. https://notomate.example.com or http://notomate-nginx. Must be the same origin notomate's editor itself uses (nginx-fronted): the update_note tool derives its collab (Hocuspocus) WebSocket endpoint from this origin's /ws/ route."
    required: true
  notomate-api-key:
    description: "Notomate personal API key (Authorization: Bearer) used to call the notomate REST API."
    required: true
  notomate-app-secret:
    description: "notomate's APP_SECRET. Only needed if the update_note tool is used (see allowed-tools): it signs a short-lived service JWT locally to authenticate the collab connection, since that only trusts a JWT cookie, not the API key. Treat as a secret."
    required: false
    default: ""
  notomate-bot-user-id:
    description: "Id of the notomate user this action acts as when editing notes via collab. Only needed if the update_note tool is used. Should be the owner of notomate-api-key so collab-side permission checks match the REST API's."
    required: false
    default: ""
  trigger-phrase:
    description: "Phrase that must appear in a comment to trigger the agent."
    required: false
    default: "@claude"
  allowed-tools:
    description: "Comma-separated list of notomate MCP tool names to allow. Defaults to the full curated set."
    required: false
    default: ""
  max-turns:
    description: "Maximum number of agent turns to run."
    required: false
    default: "30"
  node-version:
    description: "Node.js version to run the action with."
    required: false
    default: "20"

outputs:
  conclusion:
    description: "One of success, skipped, or failure."
    value: ${{ steps.run.outputs.conclusion }}
  comment-id:
    description: "The id of the reply comment that was posted, if any."
    value: ${{ steps.run.outputs.comment-id }}

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        npm ci --omit=dev

    - name: Run claude-notomate-action
      id: run
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        npx tsx src/index.ts
      env:
        INPUT_ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        INPUT_CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
        INPUT_NOTOMATE_BASE_URL: ${{ inputs.notomate-base-url }}
        INPUT_NOTOMATE_API_KEY: ${{ inputs.notomate-api-key }}
        INPUT_NOTOMATE_APP_SECRET: ${{ inputs.notomate-app-secret }}
        INPUT_NOTOMATE_BOT_USER_ID: ${{ inputs.notomate-bot-user-id }}
        INPUT_TRIGGER_PHRASE: ${{ inputs.trigger-phrase }}
        INPUT_ALLOWED_TOOLS: ${{ inputs.allowed-tools }}
        INPUT_MAX_TURNS: ${{ inputs.max-turns }}
